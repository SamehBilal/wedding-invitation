<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmed & Noura — Guest List</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #F8F5F0; --cream-dark: #EDE5D4;
  --ink: #1a1a1a; --muted: #888;
  --gold: #C9A84C; --gold-light: #E2CFAA; --gold-dark: #8B6C3A;
  --kraft: #C4A882; --kraft-dark: #A88B68; --kraft-light: #D9C4A8;
}
html { scroll-behavior: smooth; }
body { font-family: 'Jost', sans-serif; background: #0a0a0a; overflow-x: hidden; min-height: 100vh; }

/* ══ LOGIN GATE ══ */
#loginScreen {
  position: fixed; inset: 0; z-index: 999;
  background: #ede8e1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0;
  transition: opacity 0.7s ease, visibility 0.7s ease;
}
#loginScreen.gone { opacity: 0; visibility: hidden; pointer-events: none; }

.login-ornament { font-size: 18px; color: var(--gold); letter-spacing: 14px; opacity: 0.7; margin-bottom: 28px; }
.login-title { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-style: italic; font-weight: 300; color: var(--ink); margin-bottom: 6px; }
.login-sub { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); margin-bottom: 36px; font-weight: 300; }

.login-box { width: min(320px, 88vw); display: flex; flex-direction: column; gap: 12px; }
.login-field {
  width: 100%; padding: 13px 16px;
  border: 1px solid var(--gold-light); border-radius: 4px;
  font-family: 'Jost', sans-serif; font-size: 14px; color: var(--ink);
  background: #fff; outline: none; transition: border-color 0.2s;
  letter-spacing: 2px;
}
.login-field:focus { border-color: var(--gold); }
.login-field::placeholder { letter-spacing: 1px; color: #bbb; }
.login-btn {
  width: 100%; padding: 14px;
  background: var(--ink); color: var(--gold-light);
  border: 1px solid var(--gold-dark); border-radius: 4px;
  font-family: 'Jost', sans-serif; font-size: 11px;
  letter-spacing: 5px; text-transform: uppercase;
  cursor: pointer; transition: background 0.2s;
}
.login-btn:hover { background: var(--gold-dark); color: #fff; }
.login-error { font-size: 12px; color: #c00; text-align: center; display: none; margin-top: -4px; }

/* ══ DASHBOARD ══ */
#dashboard { display: none; background: var(--cream); min-height: 100vh; }
#dashboard.on { display: block; }

/* header */
.dash-hero {
  background: var(--ink); padding: 48px 32px 40px;
  text-align: center; position: relative;
}
.dash-hero::after {
  content: '';
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 60px; height: 1px; background: var(--gold);
}
.dash-ornament { font-size: 14px; color: var(--gold); letter-spacing: 12px; opacity: 0.6; margin-bottom: 16px; }
.dash-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(28px,6vw,44px); font-style: italic; font-weight: 300; color: #fff; margin-bottom: 6px; }
.dash-sub { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.35); font-weight: 300; }

/* stats row */
.stats-row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 1px; background: var(--gold-light);
  border-bottom: 1px solid var(--gold-light);
}
.stat-box {
  background: var(--cream); padding: 28px 20px; text-align: center;
}
.stat-num { font-family: 'Cormorant Garamond', serif; font-size: clamp(36px,8vw,52px); font-weight: 300; color: var(--gold-dark); line-height: 1; display: block; }
.stat-lbl { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); margin-top: 6px; display: block; font-weight: 300; }

/* toolbar */
.toolbar {
  max-width: 960px; margin: 0 auto;
  padding: 24px 24px 0;
  display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
}
.search-wrap { flex: 1; min-width: 180px; position: relative; }
.search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; stroke: var(--muted); fill: none; stroke-width: 1.5; stroke-linecap: round; pointer-events: none; }
.search-input {
  width: 100%; padding: 10px 12px 10px 36px;
  border: 1px solid var(--gold-light); border-radius: 4px;
  font-family: 'Jost', sans-serif; font-size: 13px; color: var(--ink);
  background: #fff; outline: none; transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--gold); }
.filter-btn {
  padding: 10px 16px; border: 1px solid var(--gold-light); border-radius: 4px;
  background: #fff; color: var(--ink); font-family: 'Jost', sans-serif;
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.filter-btn.active { background: var(--ink); color: var(--gold-light); border-color: var(--ink); }
.export-btn {
  padding: 10px 16px; border: 1px solid var(--gold-dark); border-radius: 4px;
  background: transparent; color: var(--gold-dark); font-family: 'Jost', sans-serif;
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
}
.export-btn:hover { background: var(--gold-dark); color: #fff; }
.export-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; }

/* guest list */
.list-wrap { max-width: 960px; margin: 0 auto; padding: 20px 24px 64px; }

.guest-card {
  background: #fff; border: 0.5px solid #e0dbd4;
  border-radius: 6px; margin-bottom: 12px;
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.guest-card:hover { box-shadow: 0 4px 20px rgba(44,24,16,0.08); }

.guest-top {
  padding: 18px 20px; display: flex;
  align-items: center; gap: 16px; cursor: pointer;
}
.guest-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--cream-dark);
  border: 1px solid var(--gold-light);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px; font-style: italic; color: var(--gold-dark);
  flex-shrink: 0;
}
.guest-info { flex: 1; min-width: 0; }
.guest-name { font-size: 16px; font-weight: 400; color: var(--ink); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.guest-meta { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
.guest-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }

.badge {
  padding: 4px 10px; border-radius: 20px;
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 400;
}
.badge-yes { background: #f0faf4; color: #2d7a4a; border: 1px solid #b0dfc0; }
.badge-no  { background: #fff0f0; color: #a03030; border: 1px solid #f0c0c0; }
.badge-na  { background: #f5f5f5; color: #888;    border: 1px solid #ddd; }

.guest-guests { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: var(--gold-dark); font-weight: 300; min-width: 24px; text-align: center; }

.chevron { width: 16px; height: 16px; stroke: var(--muted); fill: none; stroke-width: 1.5; stroke-linecap: round; transition: transform 0.3s; flex-shrink: 0; }
.guest-card.expanded .chevron { transform: rotate(180deg); }

/* expandable details */
.guest-body {
  max-height: 0; overflow: hidden;
  transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1);
  border-top: 0px solid var(--gold-light);
}
.guest-card.expanded .guest-body {
  max-height: 400px;
  border-top-width: 1px;
}
.guest-body-inner { padding: 16px 20px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 480px) { .guest-body-inner { grid-template-columns: 1fr; } }

.detail-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold-dark); margin-bottom: 6px; font-weight: 300; }
.detail-value { font-size: 14px; color: var(--ink); line-height: 1.6; }
.detail-value.empty { color: var(--muted); font-style: italic; font-size: 13px; }

/* signature preview */
.sig-preview { width: 100%; max-height: 80px; object-fit: contain; object-position: left; border: 1px solid var(--gold-light); border-radius: 4px; background: #fdfcfa; padding: 4px; }

/* empty / loading states */
.state-box { text-align: center; padding: 64px 24px; color: var(--muted); }
.state-box svg { width: 40px; height: 40px; stroke: var(--gold-light); fill: none; stroke-width: 1; margin: 0 auto 16px; display: block; }
.state-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-style: italic; color: var(--ink); margin-bottom: 8px; }
.state-sub { font-size: 13px; color: var(--muted); }

/* loading spinner */
.spinner { width: 32px; height: 32px; border: 2px solid var(--gold-light); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* footer */
.dash-footer { background: var(--ink); padding: 28px 24px; text-align: center; }
.dash-footer-text { font-size: 11px; letter-spacing: 3px; color: rgba(255,255,255,0.25); font-style: italic; font-family: 'Cormorant Garamond', serif; }
.dash-footer a { color: var(--gold); text-decoration: none; }
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="loginScreen">
  <div class="login-ornament">✦ ✦ ✦</div>
  <h1 class="login-title">Guest Dashboard</h1>
  <p class="login-sub">Ahmed &amp; Noura · May 30, 2026</p>
  <div class="login-box">
    <input class="login-field" type="password" id="loginPass" placeholder="Enter password" />
    <button class="login-btn" id="loginBtn">Enter</button>
    <p class="login-error" id="loginErr">Incorrect password. Please try again.</p>
  </div>
</div>

<!-- ══ DASHBOARD ══ -->
<div id="dashboard">
  <div class="dash-hero">
    <div class="dash-ornament">✦</div>
    <h1 class="dash-title">Ahmed &amp; Noura</h1>
    <p class="dash-sub">Guest Attendance Dashboard</p>
  </div>

  <div class="stats-row">
    <div class="stat-box">
      <span class="stat-num" id="statTotal">—</span>
      <span class="stat-lbl">Responses</span>
    </div>
    <div class="stat-box">
      <span class="stat-num" id="statYes">—</span>
      <span class="stat-lbl">Attending</span>
    </div>
    <div class="stat-box">
      <span class="stat-num" id="statNo">—</span>
      <span class="stat-lbl">Not Attending</span>
    </div>
    <div class="stat-box">
      <span class="stat-num" id="statGuests">—</span>
      <span class="stat-lbl">Total Guests</span>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Search by name…" />
    </div>
    <button class="filter-btn active" data-filter="all"   onclick="setFilter('all',this)">All</button>
    <button class="filter-btn"        data-filter="yes"   onclick="setFilter('yes',this)">Attending</button>
    <button class="filter-btn"        data-filter="no"    onclick="setFilter('no',this)">Declined</button>
    <button class="export-btn" onclick="exportCSV()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export CSV
    </button>
  </div>

  <div class="list-wrap" id="listWrap">
    <div class="state-box">
      <div class="spinner"></div>
      <p class="state-sub">Loading guests…</p>
    </div>
  </div>

  <footer class="dash-footer">
    <p class="dash-footer-text">Ahmed &amp; Noura · May 30, 2026 · <a href="index.html">← Back to invitation</a></p>
  </footer>
</div>

<script>
// ══════════════════════════════════════════
const SUPABASE_URL  = 'https://fkscjpzrcboavkfxrutj.supabase.co';
const SUPABASE_ANON = 'sb_publishable_0UTH-1i4yXlUss_P3Lt1Cw_MHVfIoiq';
const TABLE_NAME    = 'rsvps';
const DASHBOARD_PWD = 'ahmed2026'; // ← change this
// ══════════════════════════════════════════

let allRsvps   = [];
let curFilter  = 'all';
let curSearch  = '';

// ─── LOGIN ───────────────────────────────
document.getElementById('loginBtn').addEventListener('click', tryLogin);
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

function tryLogin() {
  const val = document.getElementById('loginPass').value;
  if (val === DASHBOARD_PWD) {
    document.getElementById('loginScreen').classList.add('gone');
    document.getElementById('dashboard').classList.add('on');
    document.body.style.background = 'var(--cream)';
    loadRsvps();
  } else {
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('loginPass').style.borderColor = '#c00';
    setTimeout(() => {
      document.getElementById('loginPass').style.borderColor = '';
    }, 1200);
  }
}

// ─── FETCH ───────────────────────────────
async function loadRsvps() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${TABLE_NAME}?select=*&order=submitted_at.desc`,
      { headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` } }
    );
    if (!res.ok) throw new Error(await res.text());
    allRsvps = await res.json();
    updateStats();
    renderList();
  } catch(e) {
    console.error(e);
    document.getElementById('listWrap').innerHTML = `
      <div class="state-box">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <p class="state-title">Could not load guests</p>
        <p class="state-sub">${e.message}</p>
      </div>`;
  }
}

// ─── STATS ───────────────────────────────
function updateStats() {
  const yes     = allRsvps.filter(r => r.attending === 'yes');
  const no      = allRsvps.filter(r => r.attending === 'no');
  const guests  = yes.reduce((s, r) => s + (r.guests || 1), 0);
  document.getElementById('statTotal').textContent  = allRsvps.length;
  document.getElementById('statYes').textContent    = yes.length;
  document.getElementById('statNo').textContent     = no.length;
  document.getElementById('statGuests').textContent = guests;
}

// ─── FILTER / SEARCH ─────────────────────
function setFilter(f, btn) {
  curFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}
document.getElementById('searchInput').addEventListener('input', e => {
  curSearch = e.target.value.toLowerCase();
  renderList();
});

function filtered() {
  return allRsvps.filter(r => {
    const matchFilter = curFilter === 'all' || r.attending === curFilter;
    const matchSearch = !curSearch || r.name?.toLowerCase().includes(curSearch);
    return matchFilter && matchSearch;
  });
}

// ─── RENDER ──────────────────────────────
function renderList() {
  const data = filtered();
  const wrap = document.getElementById('listWrap');

  if (!data.length) {
    wrap.innerHTML = `
      <div class="state-box">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <p class="state-title">No guests found</p>
        <p class="state-sub">Try adjusting your search or filter.</p>
      </div>`;
    return;
  }

  wrap.innerHTML = data.map((r, i) => {
    const initials = (r.name || '?').trim().split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
    const badge    = r.attending === 'yes'
      ? '<span class="badge badge-yes">Attending</span>'
      : r.attending === 'no'
      ? '<span class="badge badge-no">Declined</span>'
      : '<span class="badge badge-na">No Answer</span>';

    const guestsNum = r.attending === 'yes' ? (r.guests || 1) : '';
    const date = r.submitted_at
      ? new Date(r.submitted_at).toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'})
      : '—';

    const sigHTML = r.signature
      ? `<img class="sig-preview" src="${r.signature}" alt="Signature" />`
      : `<span class="detail-value empty">No signature</span>`;

    const msgHTML = r.message
      ? `<span class="detail-value">${escHtml(r.message)}</span>`
      : `<span class="detail-value empty">No message</span>`;

    return `
    <div class="guest-card" id="card-${i}">
      <div class="guest-top" onclick="toggleCard(${i})">
        <div class="guest-avatar">${initials}</div>
        <div class="guest-info">
          <div class="guest-name">${escHtml(r.name || '—')}</div>
          <div class="guest-meta">${date}</div>
        </div>
        <div class="guest-right">
          ${badge}
          ${guestsNum ? `<span class="guest-guests">${guestsNum}</span>` : ''}
          <svg class="chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="guest-body">
        <div class="guest-body-inner">
          <div>
            <div class="detail-label">Message</div>
            ${msgHTML}
          </div>
          <div>
            <div class="detail-label">Signature</div>
            ${sigHTML}
          </div>
          ${r.attending === 'yes' ? `
          <div>
            <div class="detail-label">Guests attending</div>
            <span class="detail-value">${r.guests || 1} person${(r.guests||1) > 1 ? 's' : ''}</span>
          </div>` : ''}
          <div>
            <div class="detail-label">Response</div>
            <span class="detail-value">${r.attending === 'yes' ? 'Will attend' : r.attending === 'no' ? 'Cannot attend' : 'No answer given'}</span>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(i) {
  document.getElementById(`card-${i}`).classList.toggle('expanded');
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── EXPORT CSV ──────────────────────────
function exportCSV() {
  const data = filtered();
  const cols = ['Name','Attending','Guests','Message','Submitted At'];
  const rows = data.map(r => [
    `"${(r.name||'').replace(/"/g,'""')}"`,
    r.attending || '',
    r.guests || '',
    `"${(r.message||'').replace(/"/g,'""')}"`,
    r.submitted_at || ''
  ].join(','));
  const csv  = [cols.join(','), ...rows].join('\n');
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'}));
  a.download = 'ahmed-noura-rsvps.csv';
  a.click();
}
</script>
</body>
</html>
